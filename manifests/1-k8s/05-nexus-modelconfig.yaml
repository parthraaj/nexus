apiVersion: v1
kind: Secret
metadata:
  name: nexus-openai-secret
  namespace: kagent
type: Opaque
stringData:
  OPENAI_API_KEY: "sk-YOUR-ACTUAL-KEY-HERE"
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: nexus-openai-gpt4o
  namespace: kagent
spec:
  apiKeySecret: nexus-openai-secret
  apiKeySecretKey: OPENAI_API_KEY
  model: gpt-4o
  provider: OpenAI
  openAI: {}
