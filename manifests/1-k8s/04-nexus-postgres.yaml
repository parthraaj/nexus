apiVersion: v1
kind: Secret
metadata:
  name: nexus-postgres-secret
  namespace: kagent
type: Opaque
stringData:
  POSTGRES_DB: kagent
  POSTGRES_USER: kagent
  POSTGRES_PASSWORD: kagent-nexus-2026
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-postgres-pvc
  namespace: kagent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nexus-ibm-block
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-postgres
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-postgres
  template:
    metadata:
      labels:
        app: nexus-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres
        image: docker.io/library/postgres:18.3-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: nexus-postgres-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: nexus-postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexus-postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: nexus-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-postgres
  namespace: kagent
spec:
  selector:
    app: nexus-postgres
  ports:
  - port: 5432
    targetPort: 5432
