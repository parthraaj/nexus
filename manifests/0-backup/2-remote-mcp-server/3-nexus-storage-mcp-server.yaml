    type: Accepted
  discoveredTools:
  - description: |-
      Create a logical host object on IBM SVC. MUTATING — requires approval.

      REQUIRED: name, and exactly ONE of: iscsiname, fcwwpn, saswwpn, nqn, fdminame (mutually exclusive — do not combine).

      PROTOCOL RULES:
      - iscsi protocol requires iscsiname
      - fcscsi protocol requires fcwwpn (or fdminame for FDMI discovery)
      - sas protocol requires saswwpn
      - fcnvme/rdmanvme/tcpnvme protocols require nqn (NVMe hosts cannot mix with other port types)
      - Dual-protocol hosts are NOT supported

      OPTIONAL: iogrp, type, site, hostcluster, ownershipgroup, portset, partition, location, autostoragediscovery, forceautozone, force
    name: storage_create_host
  - description: Create a new volume on IBM SVC. MUTATING — requires approval. Size
      unit is GB.
    name: storage_create_volume
  - description: Expand an existing volume capacity on IBM SVC. MUTATING — requires
      approval. New size must be larger than current. Size unit is GB.
    name: storage_expand_volume
  - description: Get IBM SVC system information including name, firmware version,
      model, and total capacity.
    name: storage_get_system_info
  - description: Get detailed information about a specific volume by name. Returns
      full volume detail including capacity, vdisk_UID, pool, status.
    name: storage_get_volume
  - description: List all host objects on IBM SVC. Returns id, name, status, protocol,
      port_count.
    name: storage_list_hosts
  - description: List all storage pools (mdisk groups) on IBM SVC. Returns name, status,
      capacity, free_capacity.
    name: storage_list_pools
  - description: List all volumes on IBM SVC. Returns id, name, capacity, pool, status,
      vdisk_UID.
    name: storage_list_volumes
  - description: Map a volume to a host on IBM SVC. MUTATING — requires approval.
      Creates a host-volume mapping so the host can access the volume.
    name: storage_map_volume
  observedGeneration: 1
