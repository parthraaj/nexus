  - description: 'List ApplicationProfiles showing runtime behavior of workloads.
      These profiles capture: executed processes (Execs), file access patterns (Opens),
      system calls (Syscalls), Linux capabilities used, and HTTP endpoints. Use this
      data to prioritize vulnerability findings - a CVE in an unused package is lower
      priority than one in an actively running process. Requires ''capabilities.runtimeObservability=enable''
      in Kubescape Helm chart.'
    name: kubescape_list_application_profiles
  - description: List configuration security scan results from Kubescape operator.
      Shows workloads that have been scanned for security misconfigurations.
    name: kubescape_list_configuration_scans
  - description: 'List NetworkNeighborhoods showing actual network communication patterns
      of workloads. These capture: ingress connections (who talks TO the workload),
      egress connections (who the workload talks TO), including DNS names, IP addresses,
      ports, and protocols. Use this to understand attack surface and prioritize network-related
      security findings. Requires ''capabilities.runtimeObservability=enable'' in
      Kubescape Helm chart.'
